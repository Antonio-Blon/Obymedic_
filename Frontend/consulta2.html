<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta</title>

  <link rel="stylesheet" href="assets/css/consulta2.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
  <div class="registrar-wrapper">

    <header class="topbar">
      <h1>DASHBOARD</h1>
      <a href="interfaz.html" class="close-link">
        <i class="fa-solid fa-xmark"></i>
      </a>
    </header>

    <div class="hoja">

    <!-- FICHA 1 -->
    <section class="ficha">
      <div class="fila-superior">
        <div class="celda">
          <div class="etiqueta-azul">MOTIVO DE LA CONSULTA:</div>
          <input class="linea-vacia" type="text" />
        </div>

        <div class="celda">
          <div class="texto-lateral">FECHA :</div>
          <input class="linea-vacia" type="text" />
        </div>

        <div class="celda">
          <div class="texto-lateral">EDAD :</div>
          <input class="linea-vacia" type="text" />
        </div>
      </div>

      <div class="fila-examen">
        <div class="celda-examen">
          <div class="etiqueta-azul">EXAMEN FISICO</div>
        </div>

        <div class="celda-examen"><span>P.A</span><input></div>
        <div class="celda-examen"><span>F.C.</span><input></div>
        <div class="celda-examen"><span>F.R</span><input></div>
        <div class="celda-examen"><span>T°</span><input></div>
        <div class="celda-examen"><span>PESO</span><input></div>
        <div class="celda-examen"><span>TALLA</span><input></div>
        <div class="celda-examen"><span>SPO2</span><input></div>
      </div>

      <div class="bloque">
        <div class="titulo">DIAGNÓSTICO:</div>
        <div class="area"><textarea></textarea></div>
      </div>

      <div class="bloque">
        <div class="titulo">TRATAMIENTO:</div>
        <div class="area"><textarea></textarea></div>
      </div>

      <div class="bloque">
        <div class="titulo">EXAMENES AUXILIARES</div>
        <div class="area"><textarea></textarea></div>
      </div>

   <div class="bottom-grid">

  <div class="bottom-box">
    <div class="bottom-line">Próxima Cita</div>
    <textarea class="bottom-textarea"></textarea>
  </div>  

  <div class="bottom-box">
    <div class="bottom-line">Firma y Sello:</div>
    <textarea class="bottom-textarea"></textarea>
  </div>

  <div class="bottom-box full">
    <div class="bottom-line">Atención por:</div>
    <textarea class="bottom-textarea"></textarea>
  </div>

</div>

    <div class="footer-right">
      <div class="footer-content">
        <div class="logo-area">
          <img src="../Obymedic/assets/img/logo.png" class="logo-img" />
        </div>

        <div class="footer-info">
          <p>Sistema de gestión de historias</p>
          <p>Clínicas obstetricia y Medicina</p>

          <button type="button" class="register-btn" onclick="window.location.href='ver.html'">
            REGISTRAR
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

  </div>
      </main>
    </div>
  </div>

  <script src="sidebar-loader.js"></script>
</body>
</html>
