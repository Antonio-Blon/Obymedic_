<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultado | OBYMEDIC</title>
  <link rel="stylesheet" href="assets/css/resultados.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="resultado-wrapper">
    <header class="topbar">
      <h1>OBYMEDIC</h1>
      <a href="interfaz.html" class="close-link">
        <i class="fa-solid fa-xmark"></i>
      </a>
    </header>

    <main class="resultado-content">
      <form class="resultado-form">
        <div class="form-group">
          <label for="nombre">
            <i class="fa-solid fa-user"></i>
            Nombre:
          </label>
          <input type="text" id="nombre" placeholder="Nombre" readonly>
        </div>

        <div class="form-group">
          <label for="telefono">
            <i class="fa-solid fa-phone"></i>
            Teléfono:
          </label>
          <input type="text" id="telefono" placeholder="Teléfono" readonly>
        </div>

        <div class="form-group">
          <label for="fecha">
            <i class="fa-solid fa-calendar"></i>
            Fecha de Consulta:
          </label>
          <input type="text" id="fecha" placeholder="Fecha" readonly>
        </div>

        <div class="button-row">
          <button type="button" id="btnMostrarConsulta">
            <i class="fa-solid fa-folder-open"></i>
            Mostrar Consulta
          </button>
          <button type="button" id="btnNuevaConsulta">
            <i class="fa-solid fa-plus-circle"></i>
            Nueva Consulta
          </button>
        </div>

        <!-- Contenedor para mostrar las consultas -->
        <div id="consultas-container" style="display: none;">
          <h5><i class="fa-solid fa-list"></i> Consultas anteriores:</h5>
          <div id="lista-consultas"></div>
        </div>
      </form>
    </main>
  </div>

  <script src="assets/js/resultado.js"></script>
</body>
</html>
