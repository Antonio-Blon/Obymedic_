<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultado</title>
  <link rel="stylesheet" href="assets/css/resultados.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="resultado-wrapper">
    <header class="topbar">
      <h1>DASHBOARD</h1>
      <a href="Interfaz.html" class="close-link">
        <i class="fa-solid fa-xmark"></i>
      </a>
    </header>

    <main class="resultado-content">
      <form class="resultado-form">
        <div class="form-group">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" placeholder="Nombre">
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono:</label>
          <input type="text" id="telefono" placeholder="Teléfono">
        </div>

        <div class="form-group">
          <label for="fecha">Fecha de Consulta:</label>
          <input type="text" id="fecha" placeholder="Fecha">
        </div>

        <div class="button-row">
          <button type="button">Mostrar Consulta</button>
          <button type="button">Nueva Consulta</button>
        </div>
      </form>
    </main>
  </div>

</body>
</html>
